{% extends "base.html" %}
{% block title %}Registrieren{% endblock %}
{% block content %}
<div class="min-h-[70vh] flex items-center justify-center">
    <div class="bg-white dark:bg-navy-light rounded-xl shadow-lg p-8 w-full max-w-md">
        <div class="text-center mb-8">
            <h1 class="text-3xl font-heading font-bold text-orange">Registrieren</h1>
            <p class="text-gray-500 dark:text-creme mt-2">Neuen Account erstellen</p>
        </div>

        {% if error %}
        <div class="mb-4 p-3 rounded-md bg-red-100 text-red-700 text-sm">{{ error }}</div>
        {% endif %}

        <form method="POST" action="/register" class="space-y-4">
            <div>
                <label class="block text-sm font-medium mb-1">Organisation</label>
                <input type="text" name="tenant_name" required
                    class="w-full px-4 py-2 border rounded-lg focus:ring-2 focus:ring-orange dark:bg-navy dark:border-navy-light dark:text-creme">
            </div>
            <div>
                <label class="block text-sm font-medium mb-1">Name</label>
                <input type="text" name="display_name" required
                    class="w-full px-4 py-2 border rounded-lg focus:ring-2 focus:ring-orange dark:bg-navy dark:border-navy-light dark:text-creme">
            </div>
            <div>
                <label class="block text-sm font-medium mb-1">E-Mail</label>
                <input type="email" name="email" required
                    class="w-full px-4 py-2 border rounded-lg focus:ring-2 focus:ring-orange dark:bg-navy dark:border-navy-light dark:text-creme">
            </div>
            <div>
                <label class="block text-sm font-medium mb-1">Passwort</label>
                <input type="password" name="password" required minlength="6"
                    class="w-full px-4 py-2 border rounded-lg focus:ring-2 focus:ring-orange dark:bg-navy dark:border-navy-light dark:text-creme">
            </div>
            <button type="submit"
                class="w-full bg-orange hover:bg-orange-hover text-white font-semibold py-2 px-4 rounded-lg transition">
                Registrieren
            </button>
        </form>

        <p class="mt-6 text-center text-sm text-gray-500">
            Bereits registriert? <a href="/login" class="text-orange hover:underline">Anmelden</a>
        </p>
    </div>
</div>
{% endblock %}
