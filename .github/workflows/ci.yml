name: CI

on:
  push:
    branches: [main, staging]
  pull_request:
    branches: [main, staging]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt mypy

      - name: Lint (ruff)
        run: ruff check app/ tests/

      - name: Type check (mypy)
        run: mypy app/ --ignore-missing-imports

      - name: Test with coverage
        run: pytest tests/ --cov=app --cov-report=term-missing --cov-fail-under=50

  docker:
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/staging'
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t subscription-manager:${{ github.sha }} .

      - name: Smoke test
        run: |
          docker run -d --name test-app -p 8080:8000 \
            -e APP_SECRET_KEY=ci-test-secret-key \
            -e DATABASE_URL=sqlite:////data/test.db \
            subscription-manager:${{ github.sha }}
          sleep 10
          curl -f http://localhost:8080/health || exit 1
          docker stop test-app
